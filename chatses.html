<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMessage Custom Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        /* Menggunakan font bawaan Apple untuk tampilan otentik */
        @supports (font: -apple-system-body) and (-webkit-appearance: none) {
            .ios-font { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        }
        .ios-font { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        /* Smooth scrolling untuk area chat */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Style balon chat iMessage */
        .bubble {
            max-width: 75%;
            padding: 8px 14px;
            font-size: 17px;
            line-height: 1.3;
            position: relative;
            word-wrap: break-word;
        }
        
        /* Dark Mode Colors */
        .dark-mode { background-color: #000000; color: #ffffff; }
        .dark-mode .bubble-me { background-color: #0a84ff; color: white; border-radius: 18px 18px 4px 18px; }
        .dark-mode .bubble-them { background-color: #262628; color: white; border-radius: 18px 18px 18px 4px; }
        .dark-mode .top-bar { background-color: rgba(0,0,0,0.85); border-bottom: 0.5px solid #333; }
        .dark-mode .bottom-bar { background-color: rgba(0,0,0,0.85); border-top: 0.5px solid #333; }
        .dark-mode .input-pill { border: 1px solid #444; color: #fff; }
        .dark-mode .text-muted { color: #8e8e93; }

        /* Light Mode Colors */
        .light-mode { background-color: #ffffff; color: #000000; }
        .light-mode .bubble-me { background-color: #007aff; color: white; border-radius: 18px 18px 4px 18px; }
        .light-mode .bubble-them { background-color: #e9e9eb; color: black; border-radius: 18px 18px 18px 4px; }
        .light-mode .top-bar { background-color: rgba(255,255,255,0.9); border-bottom: 0.5px solid #e5e5ea; }
        .light-mode .bottom-bar { background-color: rgba(255,255,255,0.9); border-top: 0.5px solid #e5e5ea; }
        .light-mode .input-pill { border: 1px solid #c7c7cc; color: #000; }
        .light-mode .text-muted { color: #8e8e93; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 ios-font text-sm md:text-base">

    <div class="max-w-6xl mx-auto flex flex-col md:flex-row gap-8">
        
        <!-- PANEL KONTROL (KIRI) -->
        <div class="w-full md:w-1/2 bg-white p-6 rounded-2xl shadow-lg h-fit">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">⚙️ Pengaturan iMessage</h2>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Kontak</label>
                    <input type="text" id="contactName" class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none" value="Dcoating Owner" oninput="updatePreview()">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Mode Tema</label>
                    <select id="themeSelect" class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none" onchange="updatePreview()">
                        <option value="dark">Dark Mode</option>
                        <option value="light">Light Mode</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Jam HP (Atas)</label>
                    <input type="text" id="phoneTime" class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none" value="14:31" oninput="updatePreview()">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Tampilkan Baterai</label>
                    <select id="batterySelect" class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none" onchange="updatePreview()">
                        <option value="100%">Penuh (100%)</option>
                        <option value="50%">Setengah (50%)</option>
                        <option value="20%">Low (20%)</option>
                    </select>
                </div>
            </div>

            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-gray-800">Daftar Pesan</h3>
                <button onclick="addMessage()" class="bg-green-500 hover:bg-green-600 text-white px-3 py-1 rounded text-sm font-semibold shadow transition">+ Tambah Chat</button>
            </div>

            <!-- List Chat Dinamis -->
            <div id="messagesList" class="space-y-4 max-h-[50vh] overflow-y-auto pr-2">
                <!-- Pesan akan di-render disini lewat JavaScript -->
            </div>

            <hr class="my-6">
            
            <button onclick="downloadImage()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Download JPG Resolusi Tinggi
            </button>
        </div>

        <!-- PREVIEW AREA (KANAN) -->
        <div class="w-full md:w-1/2 flex justify-center items-start">
            <!-- Container Mockup HP -->
            <div id="captureArea" class="w-[390px] h-[844px] relative overflow-hidden dark-mode flex flex-col shadow-2xl" style="border-radius: 40px; border: 8px solid #1f2937;">
                
                <!-- Status Bar (Atas) -->
                <div class="h-12 flex justify-between items-center px-6 pt-2 text-[15px] font-semibold z-20 absolute top-0 w-full" id="statusBarText">
                    <span id="previewTime">14:31</span>
                    <div class="flex items-center gap-1.5">
                        <svg width="17" height="11" viewBox="0 0 17 11" fill="currentColor"><path d="M11.5 2.5C11.5 1.11929 10.3807 0 9 0H2.5C1.11929 0 0 1.11929 0 2.5V8.5C0 9.88071 1.11929 11 2.5 11H9C10.3807 11 11.5 9.88071 11.5 8.5V2.5Z"/><path d="M13 3.5C12.4477 3.5 12 3.94772 12 4.5V6.5C12 7.05228 12.4477 7.5 13 7.5H15.5C16.3284 7.5 17 6.82843 17 6V5C17 4.17157 16.3284 3.5 15.5 3.5H13Z"/></svg>
                        <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor"><path d="M7.5 1.5C3.35786 1.5 0 4.85786 0 9H15C15 4.85786 11.6421 1.5 7.5 1.5Z"/></svg>
                        <svg width="18" height="11" viewBox="0 0 18 11" fill="currentColor"><path d="M1 2.5C1 1.67157 1.67157 1 2.5 1H13.5C14.3284 1 15 1.67157 15 2.5V8.5C15 9.32843 14.3284 10 13.5 10H2.5C1.67157 10 1 9.32843 1 8.5V2.5Z" stroke="currentColor" stroke-width="1"/><path d="M2 3C2 2.44772 2.44772 2 3 2H13C13.5523 2 14 2.44772 14 3V8C14 8.55228 13.5523 9 13 9H3C2.44772 9 2 8.55228 2 8V3Z" fill="currentColor" id="batteryFill"/><path d="M16 4V7C16.5523 7 17 6.55228 17 6V5C17 4.44772 16.5523 4 16 4Z" fill="currentColor"/></svg>
                    </div>
                </div>

                <!-- iMessage Top Navigation Bar -->
                <div class="top-bar pt-12 pb-2 px-2 flex items-center justify-between z-10 backdrop-blur-md">
                    <div class="flex items-center text-blue-500 cursor-pointer w-1/4">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        <span class="text-[17px] ml-1">20</span>
                    </div>
                    <div class="flex flex-col items-center justify-center w-2/4">
                        <div class="w-10 h-10 bg-gray-400 rounded-full flex items-center justify-center text-white text-lg overflow-hidden mb-1">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        </div>
                        <span class="text-[11px] font-semibold flex items-center gap-1">
                            <span id="previewName">Dcoating Owner</span>
                            <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#8e8e93" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                        </span>
                    </div>
                    <div class="w-1/4 flex justify-end gap-3 pr-2 text-blue-500">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                    </div>
                </div>

                <!-- Chat Body -->
                <div class="flex-1 overflow-y-auto px-4 py-4 flex flex-col gap-1 z-0 no-scrollbar" id="chatArea">
                    <!-- Pesan akan di-render disini -->
                </div>

                <!-- iMessage Bottom Input Bar -->
                <div class="bottom-bar pb-8 pt-3 px-3 flex items-center gap-3 backdrop-blur-md z-10">
                    <svg class="text-gray-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    <div class="input-pill flex-1 rounded-full h-9 flex items-center px-4">
                        <span class="text-[15px] opacity-40">iMessage</span>
                        <svg class="ml-auto opacity-50" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPT LOGIKA -->
    <script>
        // Data awal (Default state)
        let messagesData = [
            { id: 1, sender: 'me', text: 'Kalo gratisan gass aja, kalo bayar skip', time: '14.31', status: 'read' },
            { id: 2, sender: 'me', text: 'Terkait website kemaren ya bang', time: '14.31', status: 'read' },
            { id: 3, sender: 'them', text: 'Siap bang, tp biayanya gmana?', time: '14.35', status: 'none' },
            { id: 4, sender: 'me', text: 'Betul Bang, murni gratis untuk jasa desain dan coding-nya. Abang nanti cukup bayar sewa nama domainnya aja sama server/hosting buat setahun ke depan.', time: '14.38', status: 'delivered' }
        ];

        // Generate ID unik
        function generateId() {
            return Math.floor(Math.random() * 1000000);
        }

        // Fungsi Tambah Pesan Baru
        function addMessage() {
            messagesData.push({ id: generateId(), sender: 'me', text: 'Pesan baru...', time: '', status: 'none' });
            renderControlList();
            updatePreview();
        }

        // Fungsi Hapus Pesan
        function removeMessage(id) {
            messagesData = messagesData.filter(msg => msg.id !== id);
            renderControlList();
            updatePreview();
        }

        // Fungsi Update Data dari Input
        function updateMessageData(id, field, value) {
            const msg = messagesData.find(m => m.id === id);
            if(msg) {
                msg[field] = value;
                // Jika ganti ke 'them', reset status
                if(field === 'sender' && value === 'them') msg.status = 'none';
                
                // Render ulang kontrol jika ganti sender (untuk hide/show opsi status)
                if(field === 'sender') renderControlList();
                updatePreview();
            }
        }

        // Render List Kontrol Panel
        function renderControlList() {
            const listContainer = document.getElementById('messagesList');
            listContainer.innerHTML = '';

            messagesData.forEach((msg, index) => {
                const itemHtml = `
                    <div class="border border-gray-200 p-3 rounded-lg bg-gray-50 relative">
                        <button onclick="removeMessage(${msg.id})" class="absolute top-2 right-2 text-red-500 hover:bg-red-100 p-1 rounded transition">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                        
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-2 pr-6">
                            <div>
                                <label class="text-xs text-gray-500 font-bold block mb-1">Pengirim</label>
                                <select onchange="updateMessageData(${msg.id}, 'sender', this.value)" class="w-full text-sm border rounded p-1 outline-none">
                                    <option value="me" ${msg.sender === 'me' ? 'selected' : ''}>Saya (Biru)</option>
                                    <option value="them" ${msg.sender === 'them' ? 'selected' : ''}>Kontak (Abu)</option>
                                </select>
                            </div>
                            ${msg.sender === 'me' ? `
                            <div>
                                <label class="text-xs text-gray-500 font-bold block mb-1">Status</label>
                                <select onchange="updateMessageData(${msg.id}, 'status', this.value)" class="w-full text-sm border rounded p-1 outline-none">
                                    <option value="none" ${msg.status === 'none' ? 'selected' : ''}>Tanpa Status</option>
                                    <option value="delivered" ${msg.status === 'delivered' ? 'selected' : ''}>Delivered</option>
                                    <option value="read" ${msg.status === 'read' ? 'selected' : ''}>Read</option>
                                </select>
                            </div>
                            ` : '<div></div>'}
                            <div>
                                <label class="text-xs text-gray-500 font-bold block mb-1">Status Jam</label>
                                <input type="text" oninput="updateMessageData(${msg.id}, 'time', this.value)" value="${msg.time}" class="w-full text-sm border rounded p-1 outline-none" placeholder="Cth: 14.31">
                            </div>
                        </div>
                        
                        <div>
                            <label class="text-xs text-gray-500 font-bold block mb-1">Isi Pesan</label>
                            <textarea oninput="updateMessageData(${msg.id}, 'text', this.value)" class="w-full text-sm border rounded p-2 outline-none resize-none" rows="2">${msg.text}</textarea>
                        </div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', itemHtml);
            });
        }

        // Render Layar Preview HP
        function updatePreview() {
            // Ambil settingan general
            const contactName = document.getElementById('contactName').value;
            const theme = document.getElementById('themeSelect').value;
            const phoneTime = document.getElementById('phoneTime').value;
            const battery = document.getElementById('batterySelect').value;

            // Terapkan general setting
            document.getElementById('previewName').innerText = contactName;
            document.getElementById('previewTime').innerText = phoneTime;
            
            const captureArea = document.getElementById('captureArea');
            if(theme === 'dark') {
                captureArea.classList.remove('light-mode');
                captureArea.classList.add('dark-mode');
            } else {
                captureArea.classList.remove('dark-mode');
                captureArea.classList.add('light-mode');
            }

            // Atur icon batre
            const batFill = document.getElementById('batteryFill');
            if(battery === '100%') batFill.setAttribute('d', "M2 3C2 2.44772 2.44772 2 3 2H13C13.5523 2 14 2.44772 14 3V8C14 8.55228 13.5523 9 13 9H3C2.44772 9 2 8.55228 2 8V3Z");
            else if(battery === '50%') batFill.setAttribute('d', "M2 3C2 2.44772 2.44772 2 3 2H8C8.55228 2 9 2.44772 9 3V8C9 8.55228 8.55228 9 8 9H3C2.44772 9 2 8.55228 2 8V3Z");
            else batFill.setAttribute('d', "M2 3C2 2.44772 2.44772 2 3 2H4C4.55228 2 5 2.44772 5 3V8C5 8.55228 4.55228 9 4 9H3C2.44772 9 2 8.55228 2 8V3Z");

            // Render Chat Body
            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML = ''; // bersihkan

            messagesData.forEach((msg, index) => {
                const nextMsg = messagesData[index + 1];
                const isLastInGroup = !nextMsg || nextMsg.sender !== msg.sender;
                
                // Perbaiki margin bottom jika pesan beda pengirim
                const marginClass = isLastInGroup ? 'mb-2' : 'mb-0.5';

                if(msg.sender === 'me') {
                    // Pesan Saya (Kanan)
                    let statusHtml = '';
                    if(msg.status !== 'none' || msg.time !== '') {
                        let statusText = '';
                        if(msg.status === 'delivered') statusText = 'Delivered';
                        if(msg.status === 'read') statusText = 'Read';
                        
                        let combinedText = statusText;
                        if(statusText && msg.time) combinedText += ` • ${msg.time}`;
                        else if(!statusText && msg.time) combinedText = msg.time;

                        if(combinedText) {
                            statusHtml = `<div class="text-[11px] text-right mt-1 text-muted font-medium pr-1">${combinedText}</div>`;
                        }
                    }

                    chatArea.innerHTML += `
                        <div class="flex flex-col items-end ${marginClass}">
                            <div class="bubble bubble-me">${msg.text.replace(/\n/g, '<br>')}</div>
                            ${isLastInGroup ? statusHtml : ''}
                        </div>
                    `;
                } else {
                    // Pesan Mereka (Kiri)
                    let timeHtml = '';
                    if(isLastInGroup && msg.time !== '') {
                        timeHtml = `<div class="text-[11px] text-left mt-1 text-muted font-medium pl-2">${msg.time}</div>`;
                    }
                    
                    chatArea.innerHTML += `
                        <div class="flex flex-col items-start ${marginClass}">
                            <div class="bubble bubble-them">${msg.text.replace(/\n/g, '<br>')}</div>
                            ${timeHtml}
                        </div>
                    `;
                }
            });
            
            // Auto scroll ke bawah
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Fungsi Download JPG via html2canvas
        function downloadImage() {
            const captureArea = document.getElementById('captureArea');
            
            // Konfigurasi khusus html2canvas agar font & warna sesuai
            html2canvas(captureArea, {
                scale: 3, // Resolusi tinggi (Retina)
                backgroundColor: document.getElementById('themeSelect').value === 'dark' ? '#000000' : '#ffffff',
                useCORS: true,
                logging: false
            }).then(canvas => {
                // Buat link download
                const link = document.createElement('a');
                link.download = `imessage-${Date.now()}.jpg`;
                link.href = canvas.toDataURL('image/jpeg', 0.95); // JPG kualitas 95%
                link.click();
            });
        }

        // Inisialisasi awal
        window.onload = () => {
            renderControlList();
            updatePreview();
        };
    </script>
</body>
</html>
