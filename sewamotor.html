<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Bike in Bali | Modern Rental</title>
  <meta name="description" content="Sewa motor premium di Bali dengan mudah dan cepat.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: { brand: '#16181D', accent: '#F0563B' }
        }
      }
    }
  </script>
  <style>
    /* Clean scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #aaa; }
    
    /* Modal Bounce Animation */
    .modal-enter {
      opacity: 0;
      transform: scale(0.9) translateY(20px);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-enter-active {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
    .modal-backdrop-enter {
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .modal-backdrop-enter-active {
      opacity: 1;
    }
    
    /* Hide number input arrows */
    input[type="date"]::-webkit-calendar-picker-indicator {
      cursor: pointer;
      opacity: 0.6;
      transition: 0.2s;
    }
    input[type="date"]::-webkit-calendar-picker-indicator:hover { opacity: 1; }
  </style>
</head>
<body class="bg-gray-50 text-brand font-sans antialiased selection:bg-accent selection:text-white">

  <nav class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-gray-200">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-brand rounded-full flex items-center justify-center">
          <div class="w-3 h-3 bg-accent rounded-full"></div>
        </div>
        <span class="font-bold text-xl tracking-tight">BaliBikes</span>
      </div>
      <a href="#bikes" class="text-sm font-medium hover:text-accent transition-colors active:scale-95 tactile-btn">Lihat Motor</a>
    </div>
  </nav>

  <header class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-20 text-center">
    <span class="px-4 py-1.5 bg-gray-100 text-gray-600 text-xs font-semibold uppercase tracking-wider rounded-full inline-block mb-6">🛵 Bebas Antar ke Hotel</span>
    <h1 class="text-5xl md:text-7xl font-bold tracking-tighter mb-6">Jelajahi Bali <br class="hidden sm:block"/> <span class="text-gray-400">Tanpa Batas.</span></h1>
    <p class="text-lg text-gray-500 max-w-2xl mx-auto mb-10">Pilih motor idamanmu, tentukan tanggal, dan kami akan mengantarkannya langsung ke tempatmu. Sesimpel itu.</p>
  </header>

  <section id="bikes" class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 mb-8">
    <div class="flex flex-wrap items-center justify-center gap-3" id="filter-container">
      <button data-filter="all" class="filter-btn active bg-brand text-white px-5 py-2 rounded-full text-sm font-medium transition-all hover:bg-gray-800 active:scale-95 tactile-btn shadow-sm">Semua</button>
      <button data-filter="110cc" class="filter-btn bg-white text-gray-600 border border-gray-200 px-5 py-2 rounded-full text-sm font-medium transition-all hover:border-gray-300 hover:bg-gray-50 active:scale-95 tactile-btn shadow-sm">110cc</button>
      <button data-filter="125cc" class="filter-btn bg-white text-gray-600 border border-gray-200 px-5 py-2 rounded-full text-sm font-medium transition-all hover:border-gray-300 hover:bg-gray-50 active:scale-95 tactile-btn shadow-sm">125cc</button>
      <button data-filter="155cc" class="filter-btn bg-white text-gray-600 border border-gray-200 px-5 py-2 rounded-full text-sm font-medium transition-all hover:border-gray-300 hover:bg-gray-50 active:scale-95 tactile-btn shadow-sm">155cc</button>
    </div>
  </section>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 pb-24">
    <div id="bike-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
      </div>
  </main>

  <div id="booking-modal" class="fixed inset-0 z-50 hidden items-end sm:items-center justify-center pointer-events-none">
    <div id="modal-backdrop" class="absolute inset-0 bg-brand/40 backdrop-blur-sm modal-backdrop-enter pointer-events-auto" onclick="closeModal()"></div>
    
    <div id="modal-content" class="bg-white w-full sm:w-[480px] rounded-t-3xl sm:rounded-2xl shadow-2xl relative z-10 modal-enter pointer-events-auto flex flex-col max-h-[90vh]">
      <button onclick="closeModal()" class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center bg-gray-100 rounded-full text-gray-500 hover:bg-gray-200 transition-colors tactile-btn active:scale-90 z-20">✕</button>
      
      <div class="p-6 sm:p-8 overflow-y-auto">
        <div class="aspect-[4/3] bg-gray-50 rounded-xl mb-6 relative overflow-hidden flex items-center justify-center p-4">
          <img id="modal-img" src="" alt="Bike" class="object-contain w-full h-full drop-shadow-xl">
        </div>
        
        <div class="flex justify-between items-start mb-2">
          <h2 id="modal-title" class="text-2xl font-bold tracking-tight"></h2>
          <span id="modal-cc" class="bg-gray-100 text-gray-600 px-2.5 py-1 rounded-md text-xs font-semibold"></span>
        </div>
        <p class="text-gray-500 text-sm mb-6 pb-6 border-b border-gray-100" id="modal-tagline"></p>
        
        <h3 class="text-sm font-bold uppercase tracking-wider text-gray-400 mb-4">Kalkulator Sewa</h3>
        <div class="grid grid-cols-2 gap-4 mb-6">
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">Tanggal Mulai</label>
            <input type="date" id="date-start" class="w-full bg-gray-50 border border-gray-200 text-sm rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand/20 transition-all cursor-pointer">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">Tanggal Selesai</label>
            <input type="date" id="date-end" class="w-full bg-gray-50 border border-gray-200 text-sm rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand/20 transition-all cursor-pointer">
          </div>
        </div>
        
        <div class="bg-gray-50 p-4 rounded-xl mb-8 flex justify-between items-center border border-gray-100">
          <div>
            <p class="text-xs text-gray-500 font-medium mb-0.5">Total Biaya (<span id="rent-duration">0</span> hari)</p>
            <p class="text-2xl font-bold tracking-tight text-brand" id="total-price">Rp 0</p>
          </div>
          <div class="text-right text-xs text-gray-400">
            <span id="daily-rate-display" class="block"></span>
            Harga dasar
          </div>
        </div>
        
        <button id="btn-whatsapp" onclick="checkoutWA()" class="w-full bg-brand text-white font-semibold py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-gray-800 transition-all active:scale-[0.98] tactile-btn shadow-lg shadow-brand/20 opacity-50 cursor-not-allowed" disabled>
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
          Pesan via WhatsApp
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>

  <script>
   // Data Motor (Disesuaikan dengan folder aset lokal Anda)
    const bikes = [
      { id: 'scoopy', name: 'Honda Scoopy', cc: '110cc', tagline: 'Kecil, lincah, sempurna untuk jalanan Bali yang sempit.', priceDay: 60000, img: 'assets-sewamotor/scoopy.png' },
      { id: 'vario', name: 'Honda Vario', cc: '125cc', tagline: 'Keseimbangan antara tenaga dan ukuran. Sangat populer.', priceDay: 70000, img: 'assets-sewamotor/vario.png' },
      { id: 'lexi', name: 'Yamaha Lexi', cc: '125cc', tagline: 'Skuter maxi entry-level dengan ruang kaki yang luas.', priceDay: 80000, img: 'assets-sewamotor/lexi.png' },
      { id: 'nmax', name: 'Yamaha Nmax', cc: '155cc', tagline: 'Nyaman untuk perjalanan jauh keliling pulau.', priceDay: 100000, img: 'assets-sewamotor/nmax.png' },
      { id: 'pcx', name: 'Honda PCX', cc: '155cc', tagline: 'Skuter premium elegan, bagasi luas, rem pakem.', priceDay: 130000, img: 'assets-sewamotor/pcx.png' },
      { id: 'fazzio', name: 'Yamaha Fazzio', cc: '125cc', tagline: 'Desain retro modern yang sangat stylish.', priceDay: 80000, img: 'assets-sewamotor/fazzio.png' }
    ];

    let currentBike = null;

    // Haptic Feedback Helper
    const vibrate = () => {
      if (navigator.vibrate) {
        navigator.vibrate(40); // Getaran halus 40ms
      }
    };

    // Attach haptic to all tactile buttons
    document.querySelectorAll('.tactile-btn').forEach(btn => {
      btn.addEventListener('pointerdown', vibrate);
    });

    // Render Grid
    const renderBikes = (filter = 'all') => {
      const grid = document.getElementById('bike-grid');
      grid.innerHTML = '';
      
      const filtered = filter === 'all' ? bikes : bikes.filter(b => b.cc === filter);
      
      filtered.forEach((bike, i) => {
        // Delay cascade animation
        const delay = i * 50; 
        
        const card = document.createElement('div');
        // Vanilla tilt config
        card.setAttribute('data-tilt', '');
        card.setAttribute('data-tilt-max', '5');
        card.setAttribute('data-tilt-speed', '400');
        card.setAttribute('data-tilt-glare', 'true');
        card.setAttribute('data-tilt-max-glare', '0.1');
        
        card.className = `group bg-white rounded-3xl p-6 border border-gray-100 shadow-sm hover:shadow-xl transition-all duration-300 cursor-pointer animate-fade-in flex flex-col justify-between`;
        card.style.animationDelay = `${delay}ms`;
        card.style.transformStyle = 'preserve-3d';
        
        card.innerHTML = `
          <div>
            <div class="flex justify-between items-start mb-6" style="transform: translateZ(20px)">
              <span class="bg-gray-50 text-gray-500 px-3 py-1 rounded-full text-xs font-semibold tracking-wide border border-gray-100">${bike.cc}</span>
              <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center group-hover:bg-brand group-hover:text-white transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
              </div>
            </div>
            
            <div class="relative w-full h-48 mb-6 flex justify-center items-center" style="transform: translateZ(40px)">
              <img src="${bike.img}" alt="${bike.name}" class="object-contain w-[90%] h-[90%] drop-shadow-lg group-hover:scale-110 transition-transform duration-500 ease-out" 
                   onerror="this.src='https://via.placeholder.com/400x300?text=Image+Not+Found'">
            </div>
          </div>
          
          <div style="transform: translateZ(20px)">
            <h3 class="text-xl font-bold mb-1">${bike.name}</h3>
            <p class="text-sm text-gray-500 line-clamp-1 mb-4">${bike.tagline}</p>
            <div class="flex items-end gap-1">
              <span class="text-lg font-bold">Rp ${bike.priceDay.toLocaleString('id-ID')}</span>
              <span class="text-sm text-gray-400 font-medium mb-0.5">/ hari</span>
            </div>
          </div>
        `;
        
        card.addEventListener('click', () => {
          vibrate();
          openModal(bike);
        });
        grid.appendChild(card);
      });
      
      // Re-init tilt
      VanillaTilt.init(document.querySelectorAll("[data-tilt]"));
    };

    // Filter Logic
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        vibrate();
        // UI Active state
        document.querySelectorAll('.filter-btn').forEach(b => {
          b.classList.remove('bg-brand', 'text-white');
          b.classList.add('bg-white', 'text-gray-600');
        });
        e.target.classList.remove('bg-white', 'text-gray-600');
        e.target.classList.add('bg-brand', 'text-white');
        
        renderBikes(e.target.dataset.filter);
      });
    });

    // Initial Render
    renderBikes();

    // Modal Logic & Bounce Animation
    const modal = document.getElementById('booking-modal');
    const modalContent = document.getElementById('modal-content');
    const modalBackdrop = document.getElementById('modal-backdrop');
    
    // Set minimal date to today
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('date-start').min = today;
    document.getElementById('date-end').min = today;

    const openModal = (bike) => {
      currentBike = bike;
      
      // Populate data
      document.getElementById('modal-img').src = bike.img;
      document.getElementById('modal-title').textContent = bike.name;
      document.getElementById('modal-cc').textContent = bike.cc;
      document.getElementById('modal-tagline').textContent = bike.tagline;
      document.getElementById('daily-rate-display').textContent = `Rp ${bike.priceDay.toLocaleString('id-ID')}`;
      
      // Reset form
      document.getElementById('date-start').value = '';
      document.getElementById('date-end').value = '';
      calculatePrice();
      
      // Show with display block first, then add animation classes next frame
      modal.classList.remove('hidden');
      modal.classList.add('flex');
      
      requestAnimationFrame(() => {
        modalContent.classList.add('modal-enter-active');
        modalBackdrop.classList.add('modal-backdrop-enter-active');
      });
      
      document.body.style.overflow = 'hidden'; // Prevent background scrolling
    };

    const closeModal = () => {
      vibrate();
      modalContent.classList.remove('modal-enter-active');
      modalBackdrop.classList.remove('modal-backdrop-enter-active');
      
      // Wait for animation to finish
      setTimeout(() => {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        document.body.style.overflow = 'auto';
      }, 400);
    };

    // Calculator Logic
    const startInput = document.getElementById('date-start');
    const endInput = document.getElementById('date-end');
    const durationDisplay = document.getElementById('rent-duration');
    const priceDisplay = document.getElementById('total-price');
    const waBtn = document.getElementById('btn-whatsapp');

    const calculatePrice = () => {
      const start = new Date(startInput.value);
      const end = new Date(endInput.value);
      
      // Prevent backward dates
      if(startInput.value) endInput.min = startInput.value;
      
      if (startInput.value && endInput.value && end >= start) {
        const diffTime = Math.abs(end - start);
        // Minimum 1 day rent even if start & end are same day
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) || 1; 
        
        const total = diffDays * currentBike.priceDay;
        
        durationDisplay.textContent = diffDays;
        priceDisplay.textContent = `Rp ${total.toLocaleString('id-ID')}`;
        
        // Enable WA Button
        waBtn.disabled = false;
        waBtn.classList.remove('opacity-50', 'cursor-not-allowed');
      } else {
        durationDisplay.textContent = '0';
        priceDisplay.textContent = 'Rp 0';
        
        // Disable WA Button
        waBtn.disabled = true;
        waBtn.classList.add('opacity-50', 'cursor-not-allowed');
      }
    };

    startInput.addEventListener('change', calculatePrice);
    endInput.addEventListener('change', calculatePrice);

    // Add haptic feedback to inputs
    [startInput, endInput].forEach(el => {
      el.addEventListener('click', vibrate);
    });

    // WhatsApp Checkout
    const checkoutWA = () => {
      if(!currentBike || waBtn.disabled) return;
      vibrate();
      
      const startDate = startInput.value;
      const endDate = endInput.value;
      const days = durationDisplay.textContent;
      const total = priceDisplay.textContent;
      
      const message = `Halo BaliBikes, saya ingin menyewa motor:\n\n*Motor:* ${currentBike.name} (${currentBike.cc})\n*Tgl Mulai:* ${startDate}\n*Tgl Selesai:* ${endDate}\n*Durasi:* ${days} Hari\n*Total Estimasi:* ${total}\n\nApakah unit tersedia?`;
      
      // Ganti dengan nomor WhatsApp dummy/asli Anda (Format: 628xxx)
      const waNumber = '6281234567890'; 
      const waUrl = `https://wa.me/${waNumber}?text=${encodeURIComponent(message)}`;
      
      window.open(waUrl, '_blank');
    };
  </script>
</body>
</html>
